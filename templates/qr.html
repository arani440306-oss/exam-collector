<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 코드 — 시험지 수집</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFC;
     display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:20px;padding:40px 48px;text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,.12);max-width:440px;width:90%}
h1{font-size:22px;font-weight:800;margin-bottom:6px}
p{color:#64748B;font-size:14px;margin-bottom:24px}
.qr-img{width:280px;height:280px;border:1px solid #E2E8F0;border-radius:12px}
.url{margin-top:20px;background:#F1F5F9;border-radius:10px;padding:12px 16px;
     font-family:monospace;font-size:14px;color:#2563EB;word-break:break-all}
.hint{margin-top:16px;font-size:13px;color:#94A3B8}
.print-btn{margin-top:20px;padding:12px 28px;background:#2563EB;color:#fff;
           border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
@media print{.print-btn,.hint{display:none}body{background:#fff}.card{box-shadow:none}}
</style>
</head>
<body>
<div class="card">
  <h1>📄 시험지 수집 QR 코드</h1>
  <p>스마트폰으로 스캔하면 바로 접속됩니다</p>
  <img class="qr-img" src="/static/qr_code.png?v={{ ts }}" alt="QR Code">
  <div class="url">{{ url }}</div>
  <div class="hint">이 QR 코드를 인쇄하거나 화면에 띄워서 배포하세요</div>
  <button class="print-btn" onclick="window.print()">🖨️ 인쇄하기</button>
</div>
</body>
</html>
